<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alex OS">
<meta name="theme-color" content="#faf8f4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<title>Personal OS</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf8f4; --card: #ffffff; --ink: #1e2126; --ink-soft: #575e6a; --ink-faint: #8b929d;
    --line: #e8e4dc; --accent: #0e7a6d; --star: #b8860b; --bad: #a04030;
    --c-markets: #1f6f8b; --c-miami: #c05a41; --c-sports: #0e7a6d; --c-living: #7d5f85; --c-custom: #6b7280;
  }
  [data-theme="dark"] {
    --bg: #191b1e; --card: #212428; --ink: #e6e2d8; --ink-soft: #a8a49a; --ink-faint: #767c85;
    --line: #33373d; --accent: #3aa08f; --star: #d9a441; --bad: #d08770;
    --c-markets: #5b9bb5; --c-miami: #d98268; --c-sports: #3aa08f; --c-living: #a888b0;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #191b1e; --card: #212428; --ink: #e6e2d8; --ink-soft: #a8a49a; --ink-faint: #767c85;
      --line: #33373d; --accent: #3aa08f; --star: #d9a441; --bad: #d08770;
      --c-markets: #5b9bb5; --c-miami: #d98268; --c-sports: #3aa08f; --c-living: #a888b0;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    background: var(--bg); color: var(--ink);
    font: 1rem/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px 18px calc(70px + env(safe-area-inset-bottom));
    max-width: 680px; margin: 0 auto;
  }
  a { color: inherit; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
  .serif { font-family: Georgia, "Times New Roman", serif; }
  .meta { font-size: .78rem; color: var(--ink-faint); letter-spacing: .04em; }
  .hair { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
  h2.sec { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; margin: 0 0 12px; }

  /* header */
  .kicker { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; }
  h1 { font-family: Georgia, serif; font-size: 1.7rem; font-weight: 500; letter-spacing: -.01em; }

  /* letter */
  .letter { margin-top: 14px; }
  .letter-body { font-family: Georgia, serif; font-size: 1.06rem; line-height: 1.65; max-width: 58ch; white-space: pre-line; }
  .letter.collapsed .letter-body { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .letter.collapsed .r3 { display: none; }
  .letter-toggle { display: block; margin-top: 8px; font-size: .82rem; color: var(--accent); padding: 8px 0; min-height: 44px; }
  .r3 { margin-top: 14px; padding: 12px 14px; border-left: 2px solid var(--accent); background: var(--card); border-radius: 0 10px 10px 0; }
  .r3 .meta { margin-bottom: 6px; }
  .r3 a { display: block; padding: 6px 0; font-size: .92rem; text-decoration: none; font-weight: 500; }
  .r3 a:before { content: "→ "; color: var(--accent); }

  /* markets strip */
  .strip { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 6px; scrollbar-width: none; }
  .strip::-webkit-scrollbar { display: none; }
  .mkt { flex: 0 0 auto; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; min-width: 118px; }
  .mkt .l { font-size: .68rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .mkt .v { font-size: .98rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .mkt .c { font-size: .76rem; color: var(--ink-soft); }
  .daybar { font-size: .85rem; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; }
  .focus-row { display: flex; gap: 7px; margin-top: 8px; }
  .focus-row input { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-size: .9rem; background: var(--card); color: var(--ink); min-width: 0; }
  .focus-pill { font-size: .85rem; color: var(--ink); background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; margin-top: 8px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }

  /* deltas */
  .delta { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 10px; }
  .dtag { display: inline-block; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-soft); margin-bottom: 6px; }
  .dtag.worsened { color: var(--bad); border-color: var(--bad); }
  .dtag.improved, .dtag.resolved { color: var(--accent); border-color: var(--accent); }
  .delta h3 { font-family: Georgia, serif; font-size: 1.02rem; font-weight: 600; margin-bottom: 6px; }
  .delta .pc { font-size: .88rem; color: var(--ink-soft); }
  .delta .pc b { color: var(--ink); font-weight: 600; }
  .delta .why { font-size: .88rem; font-style: italic; color: var(--ink-soft); margin-top: 6px; }
  .delta .meta { margin-top: 6px; }
  .delta .meta a { color: var(--ink-soft); }

  /* themes */
  .theme { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 17px 12px; margin-bottom: 14px; position: relative; touch-action: pan-y; transition: transform .18s ease, opacity .25s ease; }
  @media (prefers-reduced-motion: reduce) { .theme, .toast { transition: none !important; } }
  .theme.gone { opacity: 0; transform: translateX(-60px); }
  .theme .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .tlabel { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; }
  .theme h3 { font-family: Georgia, serif; font-size: 1.22rem; font-weight: 600; line-height: 1.28; margin-bottom: 6px; }
  .thesis { font-size: .95rem; font-weight: 600; margin-bottom: 6px; }
  .syn { font-size: .95rem; color: var(--ink-soft); line-height: 1.6; }
  .newtoday { font-size: .88rem; margin-top: 8px; }
  .newtoday b { font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .why { font-size: .88rem; font-style: italic; color: var(--ink-soft); margin-top: 7px; }
  .trow { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px 14px; }
  .trow button, .trow .lk { font-size: .82rem; color: var(--ink-soft); padding: 10px 2px; min-height: 44px; display: inline-flex; align-items: center; gap: 4px; text-decoration: none; }
  .trow .on { color: var(--star); font-weight: 600; }
  .expander { border-top: 1px solid var(--line); margin-top: 6px; padding-top: 10px; }
  .src { padding: 7px 0; font-size: .88rem; border-bottom: 1px solid var(--line); }
  .src:last-child { border-bottom: none; }
  .src .role { font-size: .66rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
  .src a { text-decoration: none; font-weight: 500; }
  .tl-item { display: flex; gap: 10px; padding: 6px 0; font-size: .86rem; }
  .tl-item .d { color: var(--ink-faint); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .reasons { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 10px; }
  .reasons button { border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; font-size: .8rem; color: var(--ink-soft); min-height: 40px; }
  .reasons button:active { border-color: var(--ink); }

  /* filters */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 14px; }
  .filters button { font-size: .78rem; color: var(--ink-faint); border: 1px solid transparent; padding: 6px 10px; border-radius: 999px; min-height: 36px; }
  .filters button[aria-pressed="true"] { color: var(--ink); border-color: var(--ink-soft); }

  /* rabbit hole / beautiful / noticing */
  .featurecard { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 17px; }
  .featurecard h3 { font-family: Georgia, serif; font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
  .featurecard .sub { font-size: .8rem; color: var(--ink-faint); margin-bottom: 8px; }
  .featurecard p { font-size: .95rem; color: var(--ink-soft); line-height: 1.6; }
  .featurecard .act { margin-top: 10px; display: flex; gap: 16px; }
  .featurecard .act a, .featurecard .act button { font-size: .85rem; color: var(--accent); text-decoration: none; padding: 8px 0; min-height: 44px; display: inline-flex; align-items: center; }
  .notice { font-family: Georgia, serif; font-size: 1.06rem; font-style: italic; line-height: 1.6; }
  .notewrap { display: flex; gap: 7px; margin-top: 12px; }
  .notewrap input { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font-size: .9rem; background: var(--bg); color: var(--ink); min-width: 0; }
  .notewrap button { background: var(--accent); color: #fff; border-radius: 9px; padding: 10px 14px; font-size: .9rem; min-height: 44px; }

  /* queue + drawer */
  .qitem { padding: 9px 0; border-bottom: 1px solid var(--line); font-size: .92rem; }
  .qitem:last-child { border-bottom: none; }
  .qitem a { text-decoration: none; font-weight: 500; }
  .qitem .meta { margin-top: 2px; }
  details.drawer { margin-top: 8px; }
  details.drawer > summary { cursor: pointer; list-style: none; font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; padding: 12px 0; min-height: 44px; display: flex; align-items: center; gap: 6px; }
  details.drawer > summary::-webkit-details-marker { display: none; }
  details.drawer > summary:after { content: "+"; font-size: 1rem; }
  details.drawer[open] > summary:after { content: "–"; }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; margin-bottom: 12px; }
  .panel h4 { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .row { display: flex; align-items: center; gap: 9px; padding: 8px 0; font-size: .92rem; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .row input[type=checkbox] { accent-color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; }
  .row.done .txt { text-decoration: line-through; color: var(--ink-faint); }
  .row .txt { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .row .txt a { text-decoration: none; }
  .row .x { color: var(--ink-faint); font-size: 1.1rem; padding: 8px; margin: -8px; min-width: 44px; min-height: 44px; }
  .adder { display: flex; gap: 7px; margin-top: 8px; }
  .adder input { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-size: .9rem; background: var(--bg); color: var(--ink); min-width: 0; }
  .adder button { background: var(--accent); color: #fff; border-radius: 9px; padding: 9px 13px; font-size: .9rem; min-height: 44px; }
  .tick { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--line); color: transparent; flex-shrink: 0; font-size: .9rem; }
  .tick.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .muted { color: var(--ink-faint); font-size: .88rem; }

  /* status + toast + modal */
  #status { position: fixed; bottom: calc(12px + env(safe-area-inset-bottom)); right: 14px; font-size: .78rem; background: var(--card); border: 1px solid var(--star); color: var(--star); border-radius: 999px; padding: 8px 14px; z-index: 6; display: none; min-height: 40px; }
  #status.show { display: block; }
  #status.bad { color: var(--bad); border-color: var(--bad); }
  #toast { position: fixed; left: 50%; transform: translateX(-50%) translateY(20px); bottom: calc(14px + env(safe-area-inset-bottom)); background: var(--ink); color: var(--bg); border-radius: 999px; padding: 10px 16px; font-size: .88rem; display: flex; gap: 14px; align-items: center; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 7; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  #toast button { color: inherit; font-weight: 700; text-decoration: underline; min-height: 44px; }
  .offline { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; font-size: .85rem; color: var(--ink-soft); margin-bottom: 14px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(20,22,25,.5); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--card); border-radius: 16px; padding: 20px; max-width: 420px; width: 100%; }
  .modal h3 { font-family: Georgia, serif; font-size: 1.15rem; margin-bottom: 8px; }
  .modal p { font-size: .88rem; color: var(--ink-soft); margin-bottom: 12px; }
  .modal input { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font-size: .85rem; background: var(--bg); color: var(--ink); }
  .modal .btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
  .modal .btns button { padding: 10px 16px; border-radius: 9px; border: 1px solid var(--line); color: var(--ink-soft); min-height: 44px; }
  .modal .btns .go { background: var(--accent); border-color: var(--accent); color: #fff; }
  footer { margin-top: 30px; font-size: .78rem; color: var(--ink-faint); line-height: 1.7; }
  footer button, footer a { color: var(--ink-soft); text-decoration: underline; padding: 6px 0; }
</style>
</head>
<body>
<header>
  <div class="kicker" id="dateline">PERSONAL OS</div>
  <h1 id="greeting">Good day, Alex.</h1>
</header>
<main id="main"><div class="muted" style="padding:20px 0">Loading the edition…</div></main>
<footer>
  <span id="editionmeta"></span><br>
  <button id="themeToggle" type="button">Theme: auto</button> ·
  <button id="setupLink" type="button">sync setup</button> ·
  Learned each morning at 7:10 ET.
</footer>

<div id="status" role="status" tabindex="0"></div>
<div id="toast" role="status"><span id="toastmsg"></span><button id="toastundo" type="button">Undo</button></div>
<div id="live" class="sr" aria-live="polite"></div>

<div class="modal-bg" id="modalbg" role="dialog" aria-modal="true" aria-labelledby="modaltitle">
  <div class="modal">
    <h3 id="modaltitle">Connect this device</h3>
    <p>Paste your GitHub token so stars, saves and notes reach your brain. Stored only on this device; scoped to your personal-os repo.</p>
    <input id="tokenIn" type="password" placeholder="github_pat_…" autocomplete="off" aria-label="GitHub token">
    <div class="btns"><button type="button" onclick="closeSetup()">Cancel</button><button type="button" class="go" onclick="saveToken()">Save</button></div>
  </div>
</div>

<script>
'use strict';
// ============ constants & storage ============
var REPO = '1alexco-ai/personal-os';
var TOPIC_COLORS = { markets: 'var(--c-markets)', miami: 'var(--c-miami)', sports: 'var(--c-sports)', living: 'var(--c-living)' };
var DELTA_LABEL = { new: '● New', advanced: '▲ Changed', reversed: '↺ Reversed', worsened: '▼ Worsened', improved: '▲ Improved', resolved: '✓ Resolved', unchanged: '– Unchanged', watch: '◔ Still developing' };
var REASONS = [['already_knew','Already knew'],['too_repetitive','Too repetitive'],['too_shallow','Too shallow'],['not_relevant','Not relevant'],['poor_source','Poor source'],['wrong_format','Wrong format'],['not_this_story','Not this story'],['less_topic','Less of this topic']];
var store = {
  get: function(k, d) { try { var v = localStorage.getItem('pos.' + k); return v ? JSON.parse(v) : d; } catch(e) { return d; } },
  set: function(k, v) { try { localStorage.setItem('pos.' + k, JSON.stringify(v)); } catch(e) {} }
};
var $ = function(id) { return document.getElementById(id); };
function el(tag, cls, text) { var n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = text; return n; }
function todayKey() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function announce(msg) { $('live').textContent = msg; }

var DATA = null, EDITION = null, activeTopic = null;
var todos = store.get('todos', []), habits = store.get('habits', []), notes = store.get('notes', []);
var localReading = store.get('reading', []), dismissed = store.get('dismissed', {}), starred = store.get('starred', {});
var pending = store.get('pending', []), authBad = false, lastDismiss = null;

// ============ theme (dark mode) ============
(function initTheme() {
  var t = store.get('theme', 'auto');
  if (t !== 'auto') document.documentElement.setAttribute('data-theme', t);
  var btn = $('themeToggle');
  btn.textContent = 'Theme: ' + t;
  btn.onclick = function() {
    var cur = store.get('theme', 'auto');
    var next = cur === 'auto' ? 'dark' : cur === 'dark' ? 'light' : 'auto';
    store.set('theme', next);
    if (next === 'auto') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', next);
    btn.textContent = 'Theme: ' + next;
  };
})();

// ============ sync (GitHub Contents API) ============
function token() { try { return localStorage.getItem('pos.token') || ''; } catch(e) { return ''; } }
function openSetup() { $('modalbg').classList.add('show'); $('tokenIn').focus(); }
function closeSetup() { $('modalbg').classList.remove('show'); }
function saveToken() {
  var v = $('tokenIn').value.trim();
  if (v) { try { localStorage.setItem('pos.token', v); } catch(e) {} authBad = false; }
  $('tokenIn').value = ''; closeSetup(); setStatus();
  if (pending.length) flushNow();
}
var flushTimer = null;
function queueAction(a) {
  a.feedback_id = Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  a.timestamp = new Date().toISOString();
  a.edition_id = EDITION ? EDITION.id : null;
  a.client = 'mobile';
  a.schema_version = 2;
  pending.push(a);
  store.set('pending', pending);
  setStatus();
  if (!token()) { openSetup(); return a; }
  clearTimeout(flushTimer);
  flushTimer = setTimeout(flushNow, 6000);
  return a;
}
function unqueue(feedback_id) {
  var i = pending.findIndex(function(p) { return p.feedback_id === feedback_id; });
  if (i >= 0) { pending.splice(i, 1); store.set('pending', pending); setStatus(); return true; }
  return false;
}
function flushNow() {
  if (!pending.length || !token()) { setStatus(); return; }
  var batch = pending.slice();
  var name = 'feedback/fb-' + new Date().toISOString().replace(/[:.]/g, '-') + '-' + Math.random().toString(36).slice(2, 6) + '.json';
  var body = JSON.stringify({ createdAt: new Date().toISOString(), source: 'mobile', schema_version: 2, actions: batch }, null, 1);
  fetch('https://api.github.com/repos/' + REPO + '/contents/' + name, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token(), 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'feedback (mobile)', content: btoa(unescape(encodeURIComponent(body))) })
  }).then(function(r) {
    if (r.status === 401 || r.status === 403 || r.status === 404) { authBad = true; setStatus(); announce('Sync failed: token problem'); return; }
    if (!r.ok) throw new Error('http ' + r.status);
    authBad = false;
    pending = pending.filter(function(p) { return !batch.some(function(b) { return b.feedback_id === p.feedback_id; }); });
    store.set('pending', pending); setStatus();
  }).catch(function() { setStatus(); });
}
function setStatus() {
  var s = $('status');
  s.className = ''; s.classList.remove('show');
  if (authBad) { s.textContent = 'sync token invalid · tap to fix'; s.classList.add('show', 'bad'); s.onclick = openSetup; return; }
  if (pending.length && !token()) { s.textContent = pending.length + ' queued · tap to connect'; s.classList.add('show'); s.onclick = openSetup; return; }
  if (pending.length) { s.textContent = pending.length + ' syncing…'; s.classList.add('show'); s.onclick = flushNow; return; }
  s.onclick = null; // healthy: hidden
}
$('setupLink').onclick = openSetup;

// ============ toast / undo ============
var toastTimer = null;
function showToast(msg, undoFn) {
  $('toastmsg').textContent = msg;
  $('toastundo').style.display = undoFn ? '' : 'none';
  $('toastundo').onclick = function() { if (undoFn) undoFn(); hideToast(); };
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 6000);
}
function hideToast() { $('toast').classList.remove('show'); }

// ============ data load ============
function boot() {
  fetch('data.json?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(j) { store.set('lastData', j); render(j, false); })
    .catch(function() {
      var cached = store.get('lastData', null);
      if (cached) render(cached, true);
      else { $('main').textContent = ''; $('main').appendChild(el('div', 'offline', 'No edition available and nothing cached yet. The learner publishes each morning at 7:10 ET.')); }
    });
}
function render(j, offline) {
  DATA = j;
  var main = $('main');
  main.textContent = '';
  if (offline) {
    var ob = el('div', 'offline');
    ob.textContent = 'Offline — showing the last saved edition' + (j.edition ? ' from ' + j.edition.date : '') + '.';
    main.appendChild(ob);
  }

// swipe: left = dismiss, right = star
function attachSwipe(card, t) {

  card.addEventListener('touchstart', function(ev) {
    if (ev.touches.length !== 1) return;
    sx = ev.touches[0].clientX; sy = ev.touches[0].clientY; dx = 0; active = true; horizontal = false;
  }, { passive: true });
  card.addEventListener('touchmove', function(ev) {
    if (!active) return;
    dx = ev.touches[0].clientX - sx;
    var dy = ev.touches[0].clientY - sy;
    if (!horizontal && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.5) horizontal = true;
    if (horizontal) card.style.transform = 'translateX(' + dx * 0.6 + 'px)';
  }, { passive: true });
  card.addEventListener('touchend', function() {
    if (!active) return;
    active = false;
    card.style.transform = '';
    if (!horizontal) return;
    if (dx < -80) dismissTheme(t, card, null);
    else if (dx > 80) { toggleStar(t, card.querySelector('.trow button')); showToast('Starred'); }
  });
}

  drawTodos();
  var ad1 = el('div', 'adder');
  var in1 = el('input'); in1.placeholder = 'Add a to-do…'; in1.setAttribute('aria-label', 'New to-do');
  var b1 = el('button', null, 'Add'); b1.type = 'button';
  b1.onclick = function() { if (in1.value.trim()) { todos.unshift({ text: in1.value.trim(), done: false }); in1.value = ''; store.set('todos', todos); drawTodos(); } };
  ad1.appendChild(in1); ad1.appendChild(b1); p1.appendChild(ad1);
  host.appendChild(p1);
  // habits
  var p2 = el('div', 'panel'); p2.appendChild(el('h4', null, 'Habits'));
  var hl = el('div'); p2.appendChild(hl);
  function streak(h) {
    var s = 0, d = new Date();
    if (!(h.days || []).includes(todayKey())) d.setDate(d.getDate() - 1);
    for (;;) {
      var k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if ((h.days || []).includes(k)) { s++; d.setDate(d.getDate() - 1); } else break;
    }
    return s;
  }
  function drawHabits() {
    hl.textContent = '';
    if (!habits.length) hl.appendChild(el('div', 'muted', 'Add something worth repeating.'));
    habits.forEach(function(h) {
      var r = el('div', 'row');
      var on = (h.days || []).includes(todayKey());
      var tk = el('button', 'tick' + (on ? ' on' : ''), '✓'); tk.type = 'button'; tk.setAttribute('aria-label', (on ? 'Uncheck ' : 'Check ') + h.label + ' for today'); tk.setAttribute('aria-pressed', String(on));
      tk.onclick = function() { h.days = h.days || []; var k = todayKey(); if (h.days.includes(k)) h.days = h.days.filter(function(x) { return x !== k; }); else h.days.push(k); store.set('habits', habits); drawHabits(); };
      r.appendChild(tk);
      r.appendChild(el('span', 'txt', h.label));
      var st = streak(h);
      r.appendChild(el('span', 'muted', st > 0 ? st + 'd' : '—'));
      hl.appendChild(r);
    });
  }
  drawHabits();
  var ad2 = el('div', 'adder');
  var in2 = el('input'); in2.placeholder = 'New habit…'; in2.setAttribute('aria-label', 'New habit');
  var b2 = el('button', null, 'Add'); b2.type = 'button';
  b2.onclick = function() { if (in2.value.trim()) { habits.push({ label: in2.value.trim(), days: [] }); in2.value = ''; store.set('habits', habits); drawHabits(); } };
  ad2.appendChild(in2); ad2.appendChild(b2); p2.appendChild(ad2);
  host.appendChild(p2);
  // reading list
  var p3 = el('div', 'panel'); p3.appendChild(el('h4', null, 'Reading list'));
  var rl = el('div'); p3.appendChild(rl);
  function drawReading() {
    rl.textContent = '';
    var brainList = (EDITION && EDITION.reading_queue) || [];
    var merged = localReading.slice();
    brainList.forEach(function(b) { if (!merged.some(function(m) { return m.url === b.url; })) merged.push(b); });
    if (!merged.length) rl.appendChild(el('div', 'muted', 'Save a theme or the rabbit hole to build your queue.'));
    merged.slice(0, 15).forEach(function(m) {
      var r = el('div', 'row');
      var sp = el('span', 'txt'); var a = el('a', null, m.title + (m.tag === 'weekend' ? '  ·  weekend' : '')); a.href = m.url; a.target = '_blank'; a.rel = 'noopener'; sp.appendChild(a); r.appendChild(sp);
      var x = el('button', 'x', '×'); x.type = 'button'; x.setAttribute('aria-label', 'Done with ' + m.title);
      x.onclick = function() { localReading = localReading.filter(function(z) { return z.url !== m.url; }); store.set('reading', localReading); queueAction({ target_type: 'reading_item', target_id: m.url, action: 'reading_done', url: m.url }); drawReading(); };
      r.appendChild(x);
      rl.appendChild(r);
    });
  }
  drawReading();
  host.appendChild(p3);
  // notes
  var p4 = el('div', 'panel'); p4.appendChild(el('h4', null, 'Notes'));
  var nl = el('div'); p4.appendChild(nl);
  function drawNotes() {
    nl.textContent = '';
    if (!notes.length) nl.appendChild(el('div', 'muted', 'Thoughts land here — and in the brain.'));
    notes.slice(0, 10).forEach(function(n, i) {
      var r = el('div', 'row');
      r.appendChild(el('span', 'muted', n.d));
      r.appendChild(el('span', 'txt', n.text));
      var x = el('button', 'x', '×'); x.type = 'button'; x.setAttribute('aria-label', 'Delete note');
      x.onclick = function() { notes.splice(i, 1); store.set('notes', notes); drawNotes(); };
      r.appendChild(x);
      nl.appendChild(r);
    });
  }
  drawNotes();
  var ad4 = el('div', 'adder');
  var in4 = el('input'); in4.placeholder = 'Capture a thought…'; in4.setAttribute('aria-label', 'New note');
  var b4 = el('button', null, 'Add'); b4.type = 'button';
  b4.onclick = function() {
    var v = in4.value.trim(); if (!v) return;
    notes.unshift({ text: v, d: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) });
    store.set('notes', notes);
    queueAction({ target_type: 'note', target_id: null, action: 'note', text: v });
    in4.value = ''; drawNotes();
  };
  ad4.appendChild(in4); ad4.appendChild(b4); p4.appendChild(ad4);
  host.appendChild(p4);
}

// ============ boot ============
setStatus();
boot();
</script>
</body>
</html>
