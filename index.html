<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Alex OS">
<meta name="theme-color" content="#faf8f4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<title>Alex OS</title>
<style>
  :root {
    color-scheme: light;
    --bg: #faf8f4; --card: #ffffff; --ink: #1e2126; --ink-soft: #5c6370; --ink-faint: #9aa1ac;
    --line: #e8e4dc; --accent: #0e7a6d;
    --c-markets: #1f6f8b; --c-miami: #d96a50; --c-sports: #0e7a6d; --c-living: #8d6b94; --c-custom: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 26px 18px calc(50px + env(safe-area-inset-bottom));
    max-width: 720px; margin: 0 auto;
  }
  .kicker { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  h1 { font-family: Georgia, serif; font-size: 27px; font-weight: 500; letter-spacing: -0.3px; }
  .quote { font-family: Georgia, serif; font-style: italic; color: var(--ink-soft); font-size: 15px; margin-top: 9px; }
  .quote span { font-style: normal; font-size: 12.5px; color: var(--ink-faint); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 16px; }
  .chip {
    border: 1px solid var(--line); background: var(--card); border-radius: 999px;
    padding: 5px 12px; font-size: 13px; cursor: pointer; display: inline-flex; gap: 7px; align-items: center;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip.active { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink); }
  h2 { font-size: 11.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; margin: 22px 0 10px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px 13px; margin-bottom: 11px;
  }
  .card .top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .tchip { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; padding: 2px 8px; border-radius: 999px; color: #fff; }
  .card .src { color: var(--ink-faint); font-size: 12px; }
  .card h3 { font-family: Georgia, serif; font-size: 16.5px; font-weight: 500; line-height: 1.32; margin: 2px 0 5px; }
  .card h3 a { color: inherit; text-decoration: none; }
  .card p { color: var(--ink-soft); font-size: 13.5px; }
  .read { padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .read:last-child { border-bottom: none; }
  .read a { color: var(--ink); text-decoration: none; }
  .muted { color: var(--ink-faint); font-size: 13.5px; }
  .foot { margin-top: 26px; font-size: 12px; color: var(--ink-faint); line-height: 1.6; }
  .err { background: #fdf3ee; border: 1px solid #eed6c8; color: #8a4a2e; border-radius: 12px; padding: 14px 16px; font-size: 13.5px; }
</style>
</head>
<body>
  <div class="kicker" id="dateline">PERSONAL OS</div>
  <h1 id="greeting">Good day, Alex.</h1>
  <div class="quote" id="quote"></div>
  <div class="chips" id="chips"></div>
  <div id="feed"><div class="muted">Loading today's edition…</div></div>
  <div id="readingwrap"></div>
  <div class="foot">Read-only mirror · stars, habits &amp; notes live in Cowork on desktop · re-learned and republished every morning.</div>

<script>
const TOPIC_COLORS = { markets: 'var(--c-markets)', miami: 'var(--c-miami)', sports: 'var(--c-sports)', living: 'var(--c-living)' };
const QUOTES = [
  ['You have power over your mind, not outside events. Realize this, and you will find strength.', 'Marcus Aurelius'],
  ['We suffer more often in imagination than in reality.', 'Seneca'],
  ['It is not that we have a short time to live, but that we waste a lot of it.', 'Seneca'],
  ['Wealth consists not in having great possessions, but in having few wants.', 'Epictetus'],
  ['First say to yourself what you would be; and then do what you have to do.', 'Epictetus'],
  ['The impediment to action advances action. What stands in the way becomes the way.', 'Marcus Aurelius'],
  ['Attention is the beginning of devotion.', 'Mary Oliver'],
  ['Anxiety is the handmaiden of contemporary ambition.', 'Alain de Botton'],
  ['Confine yourself to the present.', 'Marcus Aurelius'],
  ['Luck is what happens when preparation meets opportunity.', 'Seneca'],
  ['He who fears death will never do anything worthy of a man who is alive.', 'Seneca'],
  ['How we spend our days is, of course, how we spend our lives.', 'Annie Dillard']
];
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let data = null, activeTopic = null;

function header() {
  const now = new Date(), h = now.getHours();
  $('greeting').textContent = (h < 5 ? 'Up late, Alex.' : h < 12 ? 'Good morning, Alex.' : h < 18 ? 'Good afternoon, Alex.' : 'Good evening, Alex.');
  const upd = data && data.generatedAt ? ' · UPDATED ' + new Date(data.generatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase() : '';
  $('dateline').textContent = 'PERSONAL OS · ' + now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase() + upd;
  const q = QUOTES[(now.getFullYear() * 372 + now.getMonth() * 31 + now.getDate()) % QUOTES.length];
  $('quote').innerHTML = '&ldquo;' + esc(q[0]) + '&rdquo; <span>— ' + esc(q[1]) + '</span>';
}
function chips() {
  const el = $('chips');
  el.innerHTML = '';
  ((data && data.interests) || []).forEach(it => {
    const c = document.createElement('button');
    c.className = 'chip' + (activeTopic === it.id ? ' active' : '');
    c.innerHTML = '<span class="dot" style="background:' + (TOPIC_COLORS[it.id] || 'var(--c-custom)') + '"></span>' + esc(it.label);
    c.onclick = () => { activeTopic = activeTopic === it.id ? null : it.id; chips(); feed(); };
    el.appendChild(c);
  });
}
function feed() {
  const el = $('feed');
  let items = ((data && data.items) || []).slice();
  if (activeTopic) items = items.filter(i => i.topic === activeTopic);
  items.sort((a, b) => (b.score || 0) - (a.score || 0));
  el.innerHTML = '';
  if (!items.length) { el.innerHTML = '<div class="muted">Nothing in this lane today.</div>'; return; }
  items.forEach(i => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML =
      '<div class="top"><span class="tchip" style="background:' + (TOPIC_COLORS[i.topic] || 'var(--c-custom)') + '">' + esc(i.topicLabel || i.topic) + '</span><span class="src">' + esc(i.source || '') + '</span></div>' +
      '<h3><a href="' + esc(i.url) + '" target="_blank" rel="noopener">' + esc(i.title) + '</a></h3>' +
      '<p>' + esc(i.blurb || '') + '</p>';
    el.appendChild(d);
  });
}
function reading() {
  const list = (data && data.readingList) || [];
  const el = $('readingwrap');
  if (!list.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<h2>On Your Reading List</h2>' + list.slice(0, 10).map(r =>
    '<div class="read"><a href="' + esc(r.url) + '" target="_blank" rel="noopener">' + esc(r.title) + '</a></div>').join('');
}
header();
fetch('data.json?t=' + Date.now(), { cache: 'no-store' })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(j => { data = j; header(); chips(); feed(); reading(); })
  .catch(() => { $('feed').innerHTML = '<div class="err">No edition published yet. The morning learner publishes daily — check back after 7:10am ET, or make sure GitHub Pages is enabled.</div>'; });
</script>
</body>
</html>
